<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klassrummatte – Svara</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1923;
      color: #f0f0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1.5rem;
    }

    main {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .logo {
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(1.6rem, 6vw, 2.2rem);
      font-weight: 600;
      margin-bottom: 2rem;
      line-height: 1.2;
    }

    #answer-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 1rem 1.25rem;
      font-size: 1.5rem;
      text-align: center;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 0.75rem;
      background: rgba(255,255,255,0.07);
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: rgba(255,255,255,0.55);
    }

    button[type="submit"] {
      padding: 1rem;
      font-size: 1.15rem;
      font-weight: 600;
      border: none;
      border-radius: 0.75rem;
      background: #457b9d;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button[type="submit"]:hover  { background: #5a9bbf; }
    button[type="submit"]:active { background: #35617d; }
    button[type="submit"]:disabled { opacity: 0.45; cursor: default; }

    #status {
      margin-top: 1.5rem;
      font-size: 1.1rem;
      min-height: 1.5rem;
      color: rgba(255,255,255,0.7);
    }

    .big-icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }

    .success-text {
      font-size: 1.4rem;
      font-weight: 600;
      color: #2a9d8f;
    }

    .waiting-text {
      margin-top: 0.75rem;
      font-size: 1rem;
      color: rgba(255,255,255,0.4);
    }

    .error-text { color: #e63946; }

    #invalid-msg {
      color: rgba(255,255,255,0.5);
      font-size: 1rem;
    }

    .hidden { display: none !important; }

    /* Liten puls-animation för vänteläge */
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.8; }
    }
    .waiting-text { animation: pulse 2.5s ease-in-out infinite; }
  </style>
</head>
<body>
  <main>
    <p class="logo">Klassrummatte</p>

    <!-- Ogiltig länk -->
    <div id="invalid-msg" class="hidden"></div>

    <!-- Ansluten – väntar på fråga -->
    <div id="waiting-wrap" class="hidden">
      <div class="big-icon">📡</div>
      <p class="success-text" style="color:rgba(255,255,255,0.75)">Ansluten!</p>
      <p class="waiting-text">Väntar på nästa fråga…</p>
    </div>

    <!-- Aktiv omgång – svara -->
    <div id="answer-wrap" class="hidden">
      <h1>Vad är ditt svar?</h1>
      <form id="answer-form">
        <input type="text" id="answer-input"
               autocomplete="off" inputmode="decimal"
               placeholder="Skriv svaret här..." maxlength="40">
        <button type="submit">Skicka svar</button>
      </form>
      <p id="status"></p>
    </div>

    <!-- Svar skickat – väntar på nästa -->
    <div id="answered-wrap" class="hidden">
      <div class="big-icon">✓</div>
      <p class="success-text">Svar skickat!</p>
      <p class="waiting-text">Väntar på nästa fråga…</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://zsmnegroxrthbgcwmrob.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzbW5lZ3JveHJ0aGJnY3dtcm9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1Njk0NTksImV4cCI6MjA4ODE0NTQ1OX0.IAvYwVmbiBBfVf-IWLe70jP-OAqtdQkLRcJVOr0a7X4';

    const params = new URLSearchParams(window.location.search);
    const code   = params.get('k');

    // Visar vilken "wrap" som är aktiv
    function showState(id) {
      ['invalid-msg', 'waiting-wrap', 'answer-wrap', 'answered-wrap'].forEach(s => {
        document.getElementById(s).classList.toggle('hidden', s !== id);
      });
    }

    if (!code) {
      const inv = document.getElementById('invalid-msg');
      inv.textContent = 'Ogiltig länk – be läraren visa QR-koden igen.';
      showState('invalid-msg');
    } else {
      // Visa vänteläge direkt
      showState('waiting-wrap');

      // Aktuell omgångs-id (uppdateras vid broadcast)
      let currentRoundId = null;

      // Prenumerera på broadcast-kanalen för sessionen
      const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      db.channel(`session-${code}`)
        .on('broadcast', { event: 'new_round' }, ({ payload }) => {
          currentRoundId = payload.round_id;
          // Återställ formulär
          document.getElementById('answer-input').value = '';
          document.getElementById('status').textContent  = '';
          document.querySelector('#answer-form button').disabled = false;
          showState('answer-wrap');
          // Sätt fokus på inmatningsfältet (fungerar på mobil när sidan är aktiv)
          document.getElementById('answer-input').focus();
        })
        .subscribe();

      // Skicka svar
      document.getElementById('answer-form').addEventListener('submit', async e => {
        e.preventDefault();
        if (!currentRoundId) return;

        const answer = document.getElementById('answer-input').value.trim();
        if (!answer) return;

        const btn    = e.target.querySelector('button');
        const status = document.getElementById('status');
        btn.disabled = true;
        status.textContent = '';

        try {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/live_answers`, {
            method:  'POST',
            headers: {
              'apikey':        SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Content-Type':  'application/json',
              'Prefer':        'return=minimal',
            },
            body: JSON.stringify({ session_code: code, answer, round_id: currentRoundId }),
          });

          if (res.ok || res.status === 201) {
            showState('answered-wrap');
          } else {
            throw new Error(`HTTP ${res.status}`);
          }
        } catch (err) {
          status.innerHTML = '<span class="error-text">Något gick fel. Försök igen.</span>';
          btn.disabled = false;
        }
      });
    }
  </script>
</body>
</html>
